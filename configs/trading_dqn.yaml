seed: 42
experiment_name: trading_dqn_spy
algorithm: DQN
task: trading
total_timesteps: 15000
eval_episodes: 1
artifact_dir: artifacts/models
report_dir: artifacts/reports
log_dir: logs
device: auto

ppo:
  n_steps: 512
  batch_size: 64
  learning_rate: 0.0003

dqn:
  buffer_size: 50000
  learning_rate: 0.0001

market_data:
  ticker: SPY
  start: 2018-01-01
  end: 2026-01-31
  interval: 1d
  output_csv: data/raw/spy_1d.csv

trading_env:
  window_size: 20
  train_ratio: 0.8
  trading_cost: 0.001
  drawdown_penalty: 0.05
  moving_average_short: 5
  moving_average_long: 20
