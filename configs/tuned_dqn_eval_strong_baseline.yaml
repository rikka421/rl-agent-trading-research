seed: 42
experiment_name: tuned_dqn_spy
algorithm: DQN
task: trading
total_timesteps: 200000
eval_episodes: 1
artifact_dir: artifacts/models
report_dir: artifacts/reports
log_dir: logs
device: auto

dqn:
  buffer_size: 50000
  learning_rate: 0.0003
  exploration_fraction: 0.7
  exploration_final_eps: 0.02
  learning_starts: 500
  train_freq: 4
  target_update_interval: 500
  gamma: 0.99

market_data:
  ticker: SPY
  start: 2018-01-01
  end: 2026-01-31
  interval: 1d
  output_csv: data/raw/spy_1d.csv

trading_env:
  window_size: 20
  train_ratio: 0.8
  trading_cost: 0.0005
  drawdown_penalty: 0.15
  holding_penalty: 0.0003
  trend_reward_coef: 0.00015
  episode_length: 504
  randomize_start: true
  reward_scale: 100.0
  moving_average_short: 10
  moving_average_long: 40
  moving_average_allow_short: true
